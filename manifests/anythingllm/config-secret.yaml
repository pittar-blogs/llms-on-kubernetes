kind: Secret
apiVersion: v1
metadata:
  name: anythingllm-config
  annotations:
    openshift.io/description: Connect to a model hosted on vLLM.
    openshift.io/display-name: Self-Hosted LLM on OCP
stringData:
  DISABLE_TELEMETRY: "true"
  GENERIC_OPEN_AI_API_KEY: ""
  GENERIC_OPEN_AI_BASE_PATH: "https://<ROUTE URL>/v1"
  GENERIC_OPEN_AI_MAX_TOKENS: "4096"
  #GENERIC_OPEN_AI_MODEL_PREF: "RedHatAI/granite-3.1-8b-instruct-quantized.w4a16"
  #GENERIC_OPEN_AI_MODEL_PREF: "RedHatAI/Qwen3-8B-quantized.w4a16"
  LLM_PROVIDER: "generic-openai"
  GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT: "32000"
  VECTOR_DB: ""
  EMBEDDING_ENGINE: "native"
type: Opaque